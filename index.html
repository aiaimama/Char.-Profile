<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐릭터 소개창 제작기</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Noto+Serif+KR:wght@500;700;900&family=Orbit&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }

    :root {
      --page-bg-1: #f3eee8; --page-bg-2: #dfe9ec; --page-bg-3: #f4ddd7;
      --ink: #2e2a27; --muted: #78685f; --line: rgba(75, 60, 52, 0.18);
      --panel: rgba(255, 255, 255, 0.78); --paper: #fffaf7;
      --accent: #b98570; --theme-color: #d9b7a8;
    }

    body {
      margin: 0; min-height: 100vh;
      font-family: "Gowun Dodum", sans-serif;
      background: linear-gradient(135deg, var(--page-bg-1) 0%, var(--page-bg-2) 52%, var(--page-bg-3) 100%);
      color: var(--ink); display: flex; justify-content: center; padding: 40px 20px;
    }

    body.theme-status-active {
      --page-bg-1: #0f131a; --page-bg-2: #161b22; --page-bg-3: #0d1117;
      --panel: rgba(20, 25, 35, 0.85); --paper: #1c2128; --ink: #e6edf3; --accent: #00f0ff;
    }

    .app { width: min(1220px, 100%); display: grid; grid-template-columns: 390px 1fr; gap: 28px; }
    .editor, .preview-wrap { background: var(--panel); border: 1px solid rgba(90, 75, 66, 0.16); border-radius: 8px; backdrop-filter: blur(12px); }
    .editor { padding: 22px; position: sticky; top: 24px; }
    .preview-wrap { padding: 28px; display: flex; justify-content: center; overflow: auto; }

    .profile-card {
      width: min(580px, 100%); min-height: 920px; padding: 40px 36px 34px;
      border-radius: 8px; background: linear-gradient(rgba(255, 255, 255, 0.77), rgba(255, 255, 255, 0.77)), var(--theme-color);
      border: 1px solid rgba(70, 55, 48, 0.16); position: relative; overflow: hidden;
    }

    /* 이미지 저장 설정 */
    img { -webkit-touch-callout: default !important; pointer-events: auto !important; user-select: auto !important; }

    /* 모바일 겹침 방지 및 중앙 정렬 */
    .profile-name-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
    .character-name { margin: 0 !important; font-size: 36px; line-height: 1.2 !important; padding-bottom: 8px; font-weight: 900; }
    .subtitle { margin: 0 !important; color: var(--muted); font-size: 15px; line-height: 1.4; word-break: keep-all; text-align: center; }

    .photo-frame { width: min(352px, 86%); margin: 0 auto 16px; border: 8px solid white; border-radius: 8px; overflow: hidden; display: grid; place-items: center; }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

    .section { 
        text-align: center !important; 
        background: rgba(255, 255, 255, 0.58); border: 1px solid rgba(95, 80, 70, 0.13); 
        border-radius: 8px; padding: 16px 18px; margin-top: 13px;
        display: flex; flex-direction: column; align-items: center;
    }
    .section-title { margin: 0 0 9px; font-size: 13px; font-weight: 900; color: #6b554b; }
    .keyword-list { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
    .keyword, .tag { padding: 6px 10px; border-radius: 999px; background: rgba(255, 255, 255, 0.64); border: 1px solid rgba(95, 80, 70, 0.16); font-size: 12px; font-weight: 700; }

    .save-button { width: 100%; padding: 13px; background: var(--ink); color: white; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; }

    @media (max-width: 940px) {
      .app { grid-template-columns: 1fr; }
      .editor { position: static; }
      .character-name { font-size: 29px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="editor">
      <h1>캐릭터 소개창 제작기</h1>
      <div class="field"><label>카드 스타일</label><select id="styleSelect"><option value="classic">클래식</option><option value="secret">비밀문서</option><option value="status">상태창</option></select></div>
      <div class="field"><label>캐릭터 이름</label><input id="nameInput" type="text" /></div>
      <div class="field"><label>짧은 부제</label><input id="subtitleInput" type="text" /></div>
      <div class="field"><label>사진 첨부</label><input id="imageInput" type="file" accept="image/*" /></div>
      <div class="field"><label>소개/성격/대사/관계/코멘트 (순서대로 입력)</label>
        <textarea id="introInput" placeholder="소개"></textarea>
        <input id="keywordInput" type="text" placeholder="성격 (쉼표 구분)" />
        <textarea id="quoteInput" placeholder="대사"></textarea>
        <textarea id="relationInput" placeholder="관계"></textarea>
        <textarea id="commentInput" placeholder="코멘트"></textarea>
      </div>
      <button class="save-button" id="saveButton">이미지로 저장</button>
    </section>

    <section class="preview-wrap">
      <article class="profile-card" id="profileCard">
        <div class="card-content">
          <div class="profile-name-container">
            <h2 class="character-name" id="namePreview">캐릭터 이름</h2>
            <p class="subtitle" id="subtitlePreview">부제를 입력하세요</p>
          </div>
          <div class="photo-frame" id="photoFrame"><img id="photoPreview" hidden /></div>
          <p id="introPreview" style="text-align:center; white-space:pre-line;"></p>
          <div class="section"><h3 class="section-title">성격</h3><div id="keywordPreview" class="keyword-list"></div></div>
          <div class="section"><h3 class="section-title">대사</h3><p id="quotePreview" style="font-weight:800;"></p></div>
          <div class="section"><h3 class="section-title">관계 성향</h3><p id="relationPreview"></p></div>
          <div class="section"><h3 class="section-title">작가 코멘트</h3><p id="commentPreview"></p></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const saveButton = document.getElementById("saveButton");
    
    // 텍스트 업데이트 로직 (간소화)
    const inputs = ['name', 'subtitle', 'intro', 'quote', 'relation', 'comment'];
    inputs.forEach(id => {
      document.getElementById(id+'Input').addEventListener('input', (e) => {
        document.getElementById(id+'Preview').textContent = e.target.value;
      });
    });

    document.getElementById('keywordInput').addEventListener('input', (e) => {
      const target = document.getElementById('keywordPreview');
      target.innerHTML = e.target.value.split(',').map(k => `<span class="keyword">${k.trim()}</span>`).join('');
    });

    document.getElementById('imageInput').addEventListener('change', (e) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = document.getElementById('photoPreview');
        img.src = reader.result; img.hidden = false;
      };
      reader.readAsDataURL(e.target.files[0]);
    });

    // 핵심: 모바일 저장 로직 안정화
    saveButton.addEventListener("click", async () => {
      saveButton.textContent = "생성 중...";
      try {
        const canvas = await html2canvas(document.getElementById("profileCard"), {
          scale: 2, // 모바일 부하를 줄이기 위해 3에서 2로 조정
          useCORS: true,
          allowTaint: true,
          backgroundColor: "#ffffff"
        });

        // 모바일 브라우저 대응: 바로 다운로드가 안 될 경우 새 탭으로 이미지 띄우기
        const imgData = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = imgData;
        link.download = "profile.png";
        
        // 아이폰/안드로이드 웹뷰 대응
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          const newWindow = window.open();
          newWindow.document.write(`<img src="${imgData}" style="width:100%;">`);
          alert("이미지가 새 창에 생성되었습니다. 이미지를 길게 눌러 저장하세요!");
        } else {
          link.click();
        }
      } catch (e) {
        alert("저장 실패! 다시 시도해주세요.");
      } finally {
        saveButton.textContent = "이미지로 저장";
      }
    });
  </script>
</body>
</html>
