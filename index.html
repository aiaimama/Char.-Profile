<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐릭터 소개창 제작기</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Noto+Serif+KR:wght@500;700;900&family=Orbit&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }

    :root {
      --page-bg-1: #f3eee8;
      --page-bg-2: #dfe9ec;
      --page-bg-3: #f4ddd7;
      --ink: #2e2a27;
      --muted: #78685f;
      --line: rgba(75, 60, 52, 0.18);
      --panel: rgba(255, 255, 255, 0.78);
      --paper: #fffaf7;
      --accent: #b98570;
      --theme-color: #d9b7a8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Gowun Dodum", "Pretendard", "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, var(--page-bg-1) 0%, var(--page-bg-2) 52%, var(--page-bg-3) 100%);
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      transition: background 0.5s ease;
    }

    body.theme-status-active {
      --page-bg-1: #0f131a;
      --page-bg-2: #161b22;
      --page-bg-3: #0d1117;
      --panel: rgba(20, 25, 35, 0.85);
      --paper: #1c2128;
      --ink: #e6edf3;
      --accent: #00f0ff;
    }

    .app {
      width: min(1220px, 100%);
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 28px;
      align-items: start;
    }

    .editor,
    .preview-wrap {
      background: var(--panel);
      border: 1px solid rgba(90, 75, 66, 0.16);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(55, 45, 38, 0.12);
      backdrop-filter: blur(12px);
    }

    body.theme-status-active .editor,
    body.theme-status-active .preview-wrap {
      border-color: rgba(0, 240, 255, 0.2);
    }

    .editor {
      padding: 22px;
      position: sticky;
      top: 24px;
    }

    .editor h1 {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 800;
      font-family: "Pretendard", sans-serif;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      font-family: "Pretendard", sans-serif;
    }

    input,
    textarea,
    select,
    button {
      font: inherit;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper);
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
      transition: all 0.2s;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(185, 133, 112, 0.14);
    }

    body.theme-status-active input:focus,
    body.theme-status-active textarea:focus,
    body.theme-status-active select:focus {
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.2);
    }

    input[type="file"] {
      padding: 10px;
      cursor: pointer;
    }

    .color-row {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 10px;
      align-items: center;
    }

    input[type="color"] {
      height: 44px;
      padding: 4px;
      cursor: pointer;
    }

    .save-button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: var(--ink);
      color: var(--paper);
      padding: 13px 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      font-family: "Pretendard", sans-serif;
    }

    .save-button:hover {
      opacity: 0.85;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-family: "Pretendard", sans-serif;
    }

    .preview-wrap {
      padding: 28px;
      display: flex;
      justify-content: center;
      overflow: auto;
    }

    .profile-card {
      width: min(580px, 100%);
      min-height: 920px;
      padding: 40px 36px 34px;
      border-radius: 8px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.77), rgba(255, 255, 255, 0.77)),
        var(--theme-color);
      border: 1px solid rgba(70, 55, 48, 0.16);
      box-shadow: 0 24px 60px rgba(48, 38, 32, 0.18);
      text-align: center;
      position: relative;
      overflow: hidden;
      color: #2d2926;
      transition: all 0.3s ease;
    }

    .profile-card::before,
    .profile-card::after,
    .corner-decoration {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .profile-card::before {
      inset: 20px;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .profile-card::after {
      left: 36px;
      right: 36px;
      top: 116px;
      height: 1px;
      background: var(--line);
    }

    .corner-decoration {
      width: 54px;
      height: 54px;
      border-color: var(--line);
      z-index: 0;
    }

    .corner-decoration.top-left {
      left: 28px;
      top: 28px;
      border-top: 2px solid;
      border-left: 2px solid;
    }

    .corner-decoration.top-right {
      right: 28px;
      top: 28px;
      border-top: 2px solid;
      border-right: 2px solid;
    }

    .corner-decoration.bottom-left {
      left: 28px;
      bottom: 28px;
      border-bottom: 2px solid;
      border-left: 2px solid;
    }

    .corner-decoration.bottom-right {
      right: 28px;
      bottom: 28px;
      border-bottom: 2px solid;
      border-right: 2px solid;
    }

    .card-content {
      position: relative;
      z-index: 1;
    }

    .style-label {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: "Pretendard", sans-serif;
    }

    .character-name {
      margin: 0;
      font-size: 36px;
      line-height: 1.2;
      font-weight: 900;
      word-break: keep-all;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    .subtitle {
      margin: 10px 0 26px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      word-break: keep-all;
    }

    .photo-frame {
      width: min(352px, 86%);
      margin: 0 auto 16px;
      border: 8px solid rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      box-shadow: 0 16px 34px rgba(55, 42, 34, 0.2);
      background: #efe8e2;
      overflow: hidden;
      display: grid;
      place-items: center;
      transition: all 0.3s;
    }

    .profile-card.ratio-square .photo-frame {
      aspect-ratio: 1 / 1;
      width: min(372px, 88%);
    }

    .profile-card.ratio-portrait {
      width: min(550px, 100%);
    }

    .profile-card.ratio-portrait .photo-frame {
      aspect-ratio: 832 / 1216;
      width: min(332px, 84%);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      padding: 24px;
      color: #8d7d72;
      font-size: 14px;
      line-height: 1.6;
      font-family: "Pretendard", sans-serif;
    }

    .intro-block {
      margin: 0 auto 15px;
      max-width: 460px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.75;
      white-space: pre-line;
      word-break: keep-all;
    }

    .section {
      text-align: left;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(95, 80, 70, 0.13);
      border-radius: 8px;
      padding: 16px 18px;
      margin-top: 13px;
    }

    .section-title {
      margin: 0 0 9px;
      font-size: 13px;
      font-weight: 900;
      color: #6b554b;
      letter-spacing: 0;
      font-family: "Pretendard", sans-serif;
    }

    .section p {
      margin: 0;
      font-size: 15px;
      line-height: 1.75;
      white-space: pre-line;
      word-break: keep-all;
    }

    .quote-section {
      text-align: center;
      background: rgba(255, 255, 255, 0.68);
    }

    .quote-section p {
      font-size: 16px;
      font-weight: 800;
      color: #4f4038;
    }

    .keyword-list,
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .keyword-list {
      justify-content: flex-start;
    }

    .tags {
      justify-content: center;
      margin-top: 22px;
    }

    .keyword,
    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(95, 80, 70, 0.16);
      color: #67564f;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .platform-name {
      margin: 26px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-align: center;
      font-family: "Pretendard", sans-serif;
    }

    .profile-card.style-classic {
      --muted: #74645b;
      --line: rgba(116, 91, 75, 0.25);
      background:
        linear-gradient(rgba(255, 252, 248, 0.8), rgba(255, 252, 248, 0.8)),
        var(--theme-color);
    }

    .profile-card.style-classic .character-name {
      font-family: "Gowun Batang", "Noto Serif KR", serif;
      font-weight: 700;
    }

    .profile-card.style-classic .style-label::before {
      content: "Classic Profile";
    }

    .profile-card.style-secret {
      --muted: #5e5546;
      --line: rgba(74, 64, 48, 0.3);
      background:
        repeating-linear-gradient(0deg, rgba(85, 68, 48, 0.045) 0 1px, transparent 1px 30px),
        linear-gradient(rgba(238, 230, 210, 0.86), rgba(238, 230, 210, 0.86)),
        var(--theme-color);
      border-color: rgba(67, 55, 40, 0.28);
    }

    .profile-card.style-secret::before {
      content: "TOP SECRET";
      position: absolute;
      top: 65px;
      right: -20px;
      font-size: 42px;
      font-weight: 900;
      color: rgba(180, 40, 40, 0.6);
      border: 4px solid rgba(180, 40, 40, 0.6);
      padding: 6px 16px;
      transform: rotate(-15deg);
      letter-spacing: 3px;
      pointer-events: none;
      z-index: 2;
      background: transparent;
      inset: auto;
      border-radius: 4px;
      font-family: "Pretendard", sans-serif;
    }

    .profile-card.style-secret .style-label::before {
      content: "Confidential File";
    }

    .profile-card.style-secret .character-name {
      font-family: "Noto Serif KR", serif;
      font-weight: 900;
    }

    .profile-card.style-secret .section,
    .profile-card.style-secret .keyword,
    .profile-card.style-secret .tag {
      background: rgba(255, 249, 235, 0.52);
      border-color: rgba(74, 64, 48, 0.2);
    }

    .profile-card.style-secret .photo-frame {
      border-color: rgba(249, 242, 222, 0.92);
      filter: saturate(0.88) contrast(1.04);
    }

    .profile-card.style-status {
      --muted: #6a9bd8;
      --line: rgba(0, 240, 255, 0.4);
      background: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 240, 255, 0.6);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(0, 240, 255, 0.05);
      color: #c9d1d9;
    }

    .profile-card.style-status::after {
      display: none;
    }

    .profile-card.style-status .corner-decoration {
      border-color: #00f0ff;
      opacity: 0.8;
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
    }

    .profile-card.style-status .style-label::before {
      content: "SYSTEM ALERT //";
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
      font-family: "Orbit", sans-serif;
    }

    .profile-card.style-status .character-name {
      color: #00f0ff;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
      font-family: "Pretendard", sans-serif;
      font-weight: 900;
    }

    .profile-card.style-status .photo-frame {
      border: 2px solid #00f0ff;
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
    }

    .profile-card.style-status .photo-placeholder {
      color: #00f0ff;
      opacity: 0.7;
    }

    .profile-card.style-status .section {
      background: rgba(0, 20, 35, 0.4);
      border-color: rgba(0, 240, 255, 0.2);
    }

    .profile-card.style-status .section-title {
      color: #ffd700;
      text-shadow: 0 0 5px rgba(255, 215, 0, 0.4);
      font-family: "Orbit", sans-serif;
    }

    .profile-card.style-status .section p,
    .profile-card.style-status .intro-block {
      color: #e6edf3;
    }

    .profile-card.style-status .quote-section {
      background: rgba(0, 240, 255, 0.05);
      border: 1px dashed rgba(0, 240, 255, 0.4);
    }

    .profile-card.style-status .quote-section p {
      color: #00f0ff;
    }

    .profile-card.style-status .keyword,
    .profile-card.style-status .tag {
      background: rgba(0, 240, 255, 0.1);
      border-color: rgba(0, 240, 255, 0.4);
      color: #00f0ff;
      box-shadow: 0 0 5px rgba(0, 240, 255, 0.2);
      font-family: "Pretendard", sans-serif;
    }

    @media (max-width: 940px) {
      body {
        padding: 22px 14px;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .editor {
        position: static;
      }

      .profile-card {
        min-height: auto;
        padding: 34px 24px;
      }

      .character-name {
        font-size: 29px;
      }
    }

    /* --- 모바일 이미지 저장 및 텍스트 겹침 해결 --- */
    img {
      -webkit-touch-callout: default !important;
      user-select: auto !important;
      -webkit-user-select: auto !important;
      pointer-events: auto !important;
    }

    /* 이름과 부제 컨테이너: 겹침 방지 */
    .profile-name-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .character-name {
      margin: 0 !important;
      line-height: 1.2 !important;
      padding-bottom: 8px;
    }

    .subtitle {
      margin: 0 !important;
      line-height: 1.4;
      word-break: keep-all;
      display: block;
    }

    /* --- 오른쪽 섹션 중앙 정렬 전용 설정 --- */
    .section {
      text-align: center !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 18px;
    }

    .keyword-list {
      justify-content: center !important;
    }

    .quote-section p {
      text-align: center !important;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="editor">
      <h1>캐릭터 소개창 제작기</h1>

      <div class="field">
        <label for="styleSelect">카드 스타일</label>
        <select id="styleSelect">
          <option value="classic">클래식 (Classic)</option>
          <option value="secret">비밀문서 (Top Secret)</option>
          <option value="status">상태창 (System Window)</option>
        </select>
      </div>

      <div class="field">
        <label for="ratioSelect">프로필 사진 규격</label>
        <select id="ratioSelect">
          <option value="square">1024 x 1024 (정사각형)</option>
          <option value="portrait">832 x 1216 (세로형)</option>
        </select>
      </div>

      <div class="field">
        <label for="nameInput">캐릭터 이름</label>
        <input id="nameInput" type="text" value="" />
      </div>

      <div class="field">
        <label for="subtitleInput">짧은 부제</label>
        <input id="subtitleInput" type="text" value="" />
      </div>

      <div class="field">
        <label for="imageInput">캐릭터 사진 첨부</label>
        <input id="imageInput" type="file" accept="image/*" />
        <p class="hint">정사각형은 1024x1024, 세로형은 832x1216 이미지를 추천합니다.</p>
      </div>

      <div class="field">
        <label for="introInput">짧은 캐릭터 소개</label>
        <textarea id="introInput"></textarea>
      </div>

      <div class="field">
        <label for="keywordInput">성격 키워드 (쉼표로 구분)</label>
        <input id="keywordInput" type="text" value="" />
      </div>

      <div class="field">
        <label for="quoteInput">대사 샘플</label>
        <textarea id="quoteInput"></textarea>
      </div>

      <div class="field">
        <label for="relationInput">관계 성향</label>
        <textarea id="relationInput"></textarea>
      </div>

      <div class="field">
        <label for="commentInput">작가 코멘트</label>
        <textarea id="commentInput"></textarea>
      </div>

      <div class="field">
        <label for="tagInput">태그 (쉼표로 구분)</label>
        <input id="tagInput" type="text" value="" />
      </div>

      <div class="field">
        <label for="themeInput">테마 색상</label>
        <div class="color-row">
          <input id="themeTextInput" type="text" value="#d9b7a8" />
          <input id="themeInput" type="color" value="#d9b7a8" />
        </div>
      </div>

      <button class="save-button" id="saveButton" type="button">이미지로 저장</button>
      <p class="hint">저장 품질을 위해 3배 해상도로 PNG를 생성합니다.</p>
    </section>

    <section class="preview-wrap">
      <article class="profile-card style-classic ratio-square" id="profileCard">
        <span class="corner-decoration top-left"></span>
        <span class="corner-decoration top-right"></span>
        <span class="corner-decoration bottom-left"></span>
        <span class="corner-decoration bottom-right"></span>

        <div class="card-content">
          <p class="style-label" aria-hidden="true"></p>

          <div class="profile-name-container">
            <h2 class="character-name" id="namePreview">캐릭터 이름</h2>
            <p class="subtitle" id="subtitlePreview">부제를 입력하세요</p>
          </div>

          <div class="photo-frame" id="photoFrame">
            <div class="photo-placeholder" id="photoPlaceholder">
              캐릭터 사진을 첨부하면<br />
              선택한 규격에 맞춰 표시됩니다
            </div>
            <img id="photoPreview" alt="캐릭터 사진" hidden />
          </div>

          <p class="intro-block" id="introPreview">캐릭터의 짧은 소개가 들어갑니다.</p>

          <div class="section">
            <h3 class="section-title">성격</h3>
            <div class="keyword-list" id="keywordPreview"></div>
          </div>

          <div class="section quote-section">
            <h3 class="section-title">대사</h3>
            <p id="quotePreview">"캐릭터의 대표적인 대사를 입력하세요."</p>
          </div>

          <div class="section">
            <h3 class="section-title">관계 성향</h3>
            <p id="relationPreview">선호하는 관계나 플레이 성향을 입력하세요.</p>
          </div>

          <div class="section">
            <h3 class="section-title">작가 코멘트</h3>
            <p id="commentPreview">추가로 덧붙일 코멘트를 입력하세요.</p>
          </div>

          <div class="tags" id="tagPreview"></div>
          <p class="platform-name">AI채팅먀달글</p>
        </div>
      </article>
    </section>
  </main>

  <script>
    const profileCard = document.getElementById("profileCard");
    const styleSelect = document.getElementById("styleSelect");
    const ratioSelect = document.getElementById("ratioSelect");
    const nameInput = document.getElementById("nameInput");
    const subtitleInput = document.getElementById("subtitleInput");
    const imageInput = document.getElementById("imageInput");
    const introInput = document.getElementById("introInput");
    const keywordInput = document.getElementById("keywordInput");
    const quoteInput = document.getElementById("quoteInput");
    const relationInput = document.getElementById("relationInput");
    const commentInput = document.getElementById("commentInput");
    const tagInput = document.getElementById("tagInput");
    const themeInput = document.getElementById("themeInput");
    const themeTextInput = document.getElementById("themeTextInput");
    const saveButton = document.getElementById("saveButton");

    const namePreview = document.getElementById("namePreview");
    const subtitlePreview = document.getElementById("subtitlePreview");
    const photoPreview = document.getElementById("photoPreview");
    const photoPlaceholder = document.getElementById("photoPlaceholder");
    const introPreview = document.getElementById("introPreview");
    const keywordPreview = document.getElementById("keywordPreview");
    const quotePreview = document.getElementById("quotePreview");
    const relationPreview = document.getElementById("relationPreview");
    const commentPreview = document.getElementById("commentPreview");
    const tagPreview = document.getElementById("tagPreview");

    function setText(input, preview, fallback) {
      preview.textContent = input.value.trim() || fallback;
    }

    function createPills(value, target, prefix = "") {
      const items = value
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean);

      target.innerHTML = "";

      items.forEach((item) => {
        const span = document.createElement("span");
        span.className = target === tagPreview ? "tag" : "keyword";
        span.textContent = prefix && !item.startsWith(prefix) ? `${prefix}${item}` : item;
        target.appendChild(span);
      });
    }

    function updateStyle() {
      profileCard.classList.remove("style-classic", "style-secret", "style-status");
      profileCard.classList.add(`style-${styleSelect.value}`);

      if (styleSelect.value === "status") {
        document.body.classList.add("theme-status-active");
      } else {
        document.body.classList.remove("theme-status-active");
      }
    }

    function updateRatio() {
      profileCard.classList.remove("ratio-square", "ratio-portrait");
      profileCard.classList.add(`ratio-${ratioSelect.value}`);
    }

    function updateTheme(color) {
      profileCard.style.setProperty("--theme-color", color);
    }

    function updateImage() {
      const file = imageInput.files[0];

      if (!file) {
        photoPreview.hidden = true;
        photoPlaceholder.hidden = false;
        photoPreview.removeAttribute("src");
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        photoPreview.src = reader.result;
        photoPreview.hidden = false;
        photoPlaceholder.hidden = true;
      };

      reader.readAsDataURL(file);
    }

    function updateAllText() {
      setText(nameInput, namePreview, "캐릭터 이름");
      setText(subtitleInput, subtitlePreview, "부제를 입력하세요");
      setText(introInput, introPreview, "캐릭터의 짧은 소개가 들어갑니다.");
      setText(quoteInput, quotePreview, "\"캐릭터의 대표적인 대사를 입력하세요.\"");
      setText(relationInput, relationPreview, "선호하는 관계나 플레이 성향을 입력하세요.");
      setText(commentInput, commentPreview, "추가로 덧붙일 코멘트를 입력하세요.");
      createPills(keywordInput.value, keywordPreview);
      createPills(tagInput.value, tagPreview, "#");
    }

    async function saveAsImage() {
      saveButton.disabled = true;
      saveButton.textContent = "저장 중...";

      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        const canvas = await html2canvas(profileCard, {
          backgroundColor: styleSelect.value === "status" ? "#0f131a" : "#ffffff",
          scale: 3,
          useCORS: true,
          imageTimeout: 15000
        });

        const link = document.createElement("a");
        const safeName = nameInput.value.trim().replace(/[\\/:*?"<>|]/g, "") || "character";
        link.download = `${safeName}-profile.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      } catch (error) {
        alert("이미지 저장에 실패했어요. 사진을 다시 첨부한 뒤 시도해보세요.");
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = "이미지로 저장";
      }
    }

    [
      nameInput,
      subtitleInput,
      introInput,
      keywordInput,
      quoteInput,
      relationInput,
      commentInput,
      tagInput
    ].forEach((input) => {
      input.addEventListener("input", updateAllText);
    });

    styleSelect.addEventListener("change", updateStyle);
    ratioSelect.addEventListener("change", updateRatio);
    imageInput.addEventListener("change", updateImage);

    themeInput.addEventListener("input", () => {
      themeTextInput.value = themeInput.value;
      updateTheme(themeInput.value);
    });

    themeTextInput.addEventListener("input", () => {
      const color = themeTextInput.value.trim();

      if (/^#[0-9a-fA-F]{6}$/.test(color)) {
        themeInput.value = color;
        updateTheme(color);
      }
    });

    saveButton.addEventListener("click", saveAsImage);

    updateAllText();
    updateStyle();
    updateRatio();
    updateTheme(themeInput.value);
  </script>
</body>
</html>
